name: Bug report
description: Report a claw-spice tooling, Docker, rendering, or simulation bug.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands such as ./claw-spice doctor or ./claw-spice sim run.
      value: |
        ```bash
        ./claw-spice doctor
        ```
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs and artifacts
      description: Attach .log summaries, measurement output, screenshots, or rendered schematic artifacts.
