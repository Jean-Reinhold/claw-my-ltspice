name: Render Schematics

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/render.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker compose build claw-spice

      - name: Render docs assets
        run: docker compose run --rm claw-spice claw-spice docs assets

      - name: Write job summary
        run: |
          {
            echo "## claw-spice render"
            echo ""
            echo "Generated schematic artifacts:"
            find runs/latest -type f | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload render artifacts
        uses: actions/upload-artifact@v7
        with:
          name: claw-spice-rendered-schematics
          path: runs/latest/**
          if-no-files-found: error
