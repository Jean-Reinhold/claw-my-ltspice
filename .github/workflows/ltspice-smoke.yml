name: LTspice Docker Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "src/**"
      - "examples/**"
      - ".github/workflows/ltspice-smoke.yml"

permissions:
  contents: read

jobs:
  ltspice-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build claw-spice LTspice image
        run: docker compose build claw-spice

      - name: Run container doctor
        run: docker compose run --rm claw-spice claw-spice doctor

      - name: Run RC transient example
        run: docker compose run --rm claw-spice claw-spice examples run

      - name: Render example schematic
        run: docker compose run --rm claw-spice claw-spice examples render

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## LTspice Docker Smoke"
            echo ""
            echo "This workflow builds a local Docker image that downloads LTspice during the build."
            echo "The repository does not redistribute LTspice binaries."
            echo ""
            echo "Artifacts generated under runs/latest:"
            find runs/latest -type f | sort | sed 's/^/- /' || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-spice-ltspice-smoke
          path: |
            runs/**
            examples/**/*.log
            examples/**/*.raw
          if-no-files-found: warn
