name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "src/**"
      - "examples/**"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build Docker image
        run: docker compose build claw-spice

      - name: Generate docs assets
        run: docker compose run --rm claw-spice claw-spice docs assets

      - name: Build MkDocs site
        run: docker compose run --rm claw-spice claw-spice docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
