site_name: claw-spice
site_description: OpenCode-assisted LTspice automation with Docker, code-generated schematics, rendered example previews, terminal rendering, transient simulations, GitHub Pages, and GitHub Actions workflows.
site_url: https://jean-reinhold.github.io/claw-my-ltspice/
repo_url: https://github.com/Jean-Reinhold/claw-my-ltspice
repo_name: Jean-Reinhold/claw-my-ltspice
docs_dir: pages
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: indigo
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Overview: index.md
  - Quick Start: quick-start.md
  - Engineering Workflow: engineering-workflow.md
  - Runtime Architecture: docker.md
  - CLI Reference: command-reference.md
  - Code-Generated Schematics: code-to-schematic.md
  - Schematic Rendering: schematic-rendering.md
  - Simulation And Analysis: simulation-analysis.md
  - Circuit Examples: examples.md
  - Theory To Examples: theory-to-examples.md
  - RC Step Walkthrough: example-rc-step.md
  - Op-Amp Walkthroughs: example-opamps.md
  - Precision Rectifier Walkthrough: example-precision-rectifier.md
  - Sallen-Key Walkthrough: example-sallen-key-lowpass.md
  - Schmitt Trigger Walkthrough: example-schmitt-triggers.md
  - Gallery: gallery.md
  - Plots And FFT Gallery: signal-plots.md
  - AI Workflow: opencode.md
  - Full AI Instructions: ai-instructions.md
  - GitHub Actions: github-actions.md
  - Models And Licensing: model-policy.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/css/extra.css
